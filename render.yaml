services:
  - type: web
    name: kds-server
    env: node
    rootDir: server
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: PORT
        fromService:
          type: web
          name: kds-server
          property: port
